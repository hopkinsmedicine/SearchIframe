<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-12">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Search Portal</h1>
            
            <form action="no-js-index.html" method="GET" class="flex gap-2">
                <input 
                    type="text" 
                    name="q" 
                    placeholder="Search covid-19..." 
                    class="flex-1 border border-slate-300 rounded-xl px-4 py-3 outline-none"
                    required
                >
                <input type="hidden" name="page" value="1">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">
                    Search
                </button>
            </form>
        </div>

        <div class="rounded-2xl border border-slate-200 overflow-hidden bg-white shadow-sm">
            <iframe id="resultsFrame" class="w-full h-[400px]"></iframe>
        </div>
    </div>

    <script>
        (function(){
            window.addEventListener("load", function(){
                // We need this tiny bit of logic to "hand off" the parent's URL params to the iframe
                var params = window.location.search,
                    iframe = document.getElementById('resultsFrame'),
                    iframeUrl = "responsive-height-iframe.html";
                
                // If the parent has ?q=covid, we load iframe.html?q=covid
                if (params) {
                    iframe.src = iframeUrl + params;
                } else {
                    iframe.src = iframeUrl;
                }
            });

            window.addEventListener("message", function(event) {
                if (typeof event.data != "string" || event.data.indexOf("resize:") == -1) return;
                
                document.getElementById('resultsFrame').style.height = event.data.replace("resize:", "") + "px";
            }, false);
        })();
    </script>
    <style>
        #resultsFrame {
            width: 100%;
        }
        .results-frame-container {
            margin-top: 2.5rem;
            max-width: 47rem;
        }
    </style>
    
</body>
</html>
