<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-6 font-sans">

    <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <p class="text-sm">Enter a query above to see results.</p>
    </div>

    <div id="resultsUI" class="hidden">
        <div class="mb-6">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 text-black">Search Results for:
                <span id="keywordDisplay" class="inline-block italic"></span>
            </h2>
        </div>

        <div id="itemsContainer" class="space-y-3 mb-8"></div>

        <div class="flex items-center justify-between pt-6 border-t border-slate-100">
            <span id="paginationLabel" class="text-sm font-medium text-slate-500"></span>
            
            <div class="flex gap-2">
                <a id="prevBtn" target="_top" class="hidden px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-200 transition">Previous</a>
                <a id="nextBtn" target="_top" class="hidden px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-200 transition">Next</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        const page = parseInt(params.get('page')) || 1;
        const limit = 10;
        const total = 100;

        async function init() {
            if (!q) return;

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultsUI').classList.remove('hidden');
            document.getElementById('keywordDisplay').innerText = `"${q}"`;

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    body: JSON.stringify({ q, page, pagecnt: limit }),
                    headers: { 'Content-type': 'application/json' }
                });

                const start = (page - 1) * limit + 1;
                const end = Math.min(page * limit, total);
                document.getElementById('paginationLabel').innerText = `Showing ${start} to ${end} of ${total}`;

                const container = document.getElementById('itemsContainer');
                container.innerHTML = Array(2).fill(0).map((_, i) => `
                    <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                        <div class="h-2 w-16 bg-blue-200 rounded mb-2"></div>
                        <div class="h-3 w-3/4 bg-slate-200 rounded"></div>
                    </div>
                `).join('');

                const prev = document.getElementById('prevBtn');
                const next = document.getElementById('nextBtn');

                if (page > 1) {
                    // Update the link to point to the PARENT index file
                    prev.href = `no-js-index.html?q=${encodeURIComponent(q)}&page=${page - 1}`;
                    prev.classList.remove('hidden');
                }
                if (end < total) {
                    // Update the link to point to the PARENT index file
                    next.href = `no-js-index.html?q=${encodeURIComponent(q)}&page=${page + 1}`;
                    next.classList.remove('hidden');
                }

            } catch (err) {
                console.error("Fetch failed", err);
            }
        }
        init();
    </script>
</body>
</html>
